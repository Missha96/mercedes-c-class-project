<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Вход и Регистрация</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; gap: 50px; margin-top: 50px; background-color: #09090b; color: #f4f4f5; }
        .form-box { border: 1px solid #27272a; padding: 20px; border-radius: 8px; width: 300px; background-color: #18181b; }
        input { width: 90%; padding: 8px; margin: 10px 0; background-color: #09090b; color: white; border: 1px solid #27272a; }
        button { width: 95%; padding: 10px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        .error { color: #ff4a4a; font-size: 14px; }
    </style>
</head>
<body>
    <div class="form-box">
        <h2>Регистрация</h2>
        <form id="registerForm">
            <input type="text" id="regUsername" placeholder="Потребителско име" required>
            <input type="password" id="regPassword" placeholder="Парола" required>
            <button type="submit">Регистрирай се</button>
            <p id="regMessage"></p>
        </form>
    </div>
    <div class="form-box">
        <h2>Вход</h2>
        <form id="loginForm">
            <input type="text" id="loginUsername" placeholder="Потребителско име" required>
            <input type="password" id="loginPassword" placeholder="Парола" required>
            <button type="submit">Влез</button>
            <p id="loginMessage" class="error"></p>
        </form>
    </div>
    <script>
        function getUsers() { return JSON.parse(localStorage.getItem('users_db') || '[]'); }
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            let users = getUsers();
            if (users.some(u => u.username.toLowerCase() === username.toLowerCase())) {
                document.getElementById('regMessage').textContent = "Потребителското име е заето!";
                return;
            }
            let userRole = username.toLowerCase() === "admin" ? "admin" : "user";
            users.push({ username, password, role: userRole });
            localStorage.setItem('users_db', JSON.stringify(users));
            document.getElementById('regMessage').textContent = `Успешна регистрация (${userRole})!`;
        });
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const user = getUsers().find(u => u.username.toLowerCase() === username.toLowerCase() && u.password === password);
            if (!user) {
                document.getElementById('loginMessage').textContent = "Грешно име или парола!";
                return;
            }
            localStorage.setItem('currentUser', JSON.stringify(user));
            window.location.href = '/dashboard';
        });
    </script>
</body>
</html>
